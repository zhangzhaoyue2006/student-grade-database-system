{% extends "base.html" %}

{% block title %}修改密码 - 学生成绩数据库系统{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <h1>修改密码</h1>
        {% if session.get("must_change_password") %}
            <p class="muted">首次登录或管理员重置密码后，需要先修改密码才能继续使用系统。</p>
        {% endif %}

        <form method="post" class="form">
            <label>
                原密码
                <input id="old-password" type="password" name="old_password" required>
            </label>
            <label>
                新密码
                <input id="new-password" type="password" name="new_password" required>
            </label>
            <label>
                确认新密码
                <input id="confirm-password" type="password" name="confirm_password" required>
            </label>
            <div class="form-actions">
                <button type="submit">保存密码</button>
                <a class="button secondary" href="{{ url_for('dashboard.dashboard') }}">返回</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
