{% extends "base.html" %}

{% block title %}{% if mode == "new" %}新增专业{% else %}编辑专业{% endif %} - 学生成绩数据库系统{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>{% if mode == "new" %}新增专业{% else %}编辑专业{% endif %}</h1>
    <p class="muted">同一院系下专业名称不能重复，学分要求不能小于 0。</p>
</section>

<section class="form-panel">
    <form method="post" class="form wide-form">
        <label>
            专业名称
            <input type="text" name="major_name" value="{{ major.major_name or '' }}" maxlength="100" required>
        </label>

        <label>
            所属院系
            <select name="department_id" required>
                <option value="">请选择院系</option>
                {% for department in departments %}
                    <option value="{{ department.department_id }}" {% if major.department_id|string == department.department_id|string %}selected{% endif %}>
                        {{ department.department_name }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <div class="form-grid-3">
            <label>
                本科学分要求
                <input type="number" name="bachelor_credit_req" value="{{ major.bachelor_credit_req or 0 }}" min="0" step="0.5" required>
            </label>

            <label>
                硕士学分要求
                <input type="number" name="master_credit_req" value="{{ major.master_credit_req or 0 }}" min="0" step="0.5" required>
            </label>

            <label>
                博士学分要求
                <input type="number" name="doctor_credit_req" value="{{ major.doctor_credit_req or 0 }}" min="0" step="0.5" required>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit">{% if mode == "new" %}保存专业{% else %}保存修改{% endif %}</button>
            <a class="button secondary" href="{{ url_for('majors.list_majors') }}">返回</a>
        </div>
    </form>
</section>
{% endblock %}
