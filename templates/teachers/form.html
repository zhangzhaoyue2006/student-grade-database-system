{% extends "base.html" %}

{% block title %}{% if mode == "new" %}新增教师{% else %}编辑教师{% endif %} - 学生成绩数据库系统{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>{% if mode == "new" %}新增教师{% else %}编辑教师{% endif %}</h1>
    <p class="muted">教师编号需要保持唯一，职称从系统职称表中选择。</p>
</section>

<section class="form-panel">
    <form method="post" class="form wide-form">
        <div class="form-grid-2">
            <label>教师编号<input type="text" name="teacher_no" value="{{ teacher.teacher_no or '' }}" maxlength="30" required></label>
            <label>姓名<input type="text" name="name" value="{{ teacher.name or '' }}" maxlength="50" required></label>
        </div>
        <label>
            所属院系
            <select name="department_id" required>
                <option value="">请选择院系</option>
                {% for department in departments %}
                    <option value="{{ department.department_id }}" {% if teacher.department_id|string == department.department_id|string %}selected{% endif %}>{{ department.department_name }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="form-grid-2">
            <label>
                职称
                <select name="title_id">
                    <option value="">未设置</option>
                    {% for title in titles %}
                        <option value="{{ title.title_id }}" {% if teacher.title_id|string == title.title_id|string %}selected{% endif %}>{{ title.title_name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>电话<input type="text" name="phone" value="{{ teacher.phone or '' }}" maxlength="30"></label>
        </div>
        <div class="form-actions">
            <button type="submit">{% if mode == "new" %}保存教师{% else %}保存修改{% endif %}</button>
            <a class="button secondary" href="{{ url_for('teachers.list_teachers') }}">返回</a>
        </div>
    </form>
</section>
{% endblock %}
