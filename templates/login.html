{% extends "base.html" %}

{% block title %}登录 - 学生成绩数据库系统{% endblock %}

{% block topnav %}<nav class="nav"></nav>{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <h1>系统登录</h1>

        <form method="post" class="form">
            <label>
                用户名
                <input type="text" name="username" value="{{ username or '' }}" placeholder="请输入用户名" required>
            </label>

            <label>
                密码
                <input type="password" name="password" placeholder="请输入密码" required>
            </label>

            <button type="submit">登录</button>
        </form>
    </div>
</section>
{% endblock %}
