{% extends "base.html" %}

{% block title %}重置密码 - 学生成绩数据库系统{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>重置密码</h1>
    <p class="muted">正在为用户 {{ user.username }} 重置登录密码。</p>
</section>

<section class="form-panel">
    <form method="post" class="form wide-form">
        <label>
            新密码
            <input id="reset-password" type="password" name="password" required>
        </label>
        <label>
            确认新密码
            <input id="reset-confirm-password" type="password" name="confirm_password" required>
        </label>
        <div class="form-actions">
            <button type="submit">保存密码</button>
            <a class="button secondary" href="{{ url_for('system.users') }}">返回</a>
        </div>
    </form>
</section>
{% endblock %}
