{% extends "base.html" %}

{% block title %}用户与系统管理 - 学生成绩数据库系统{% endblock %}

{% block content %}
<section class="page-heading row-between">
    <div>
        <h1>用户与系统管理</h1>
        <p class="muted">维护登录账号、查看角色权限说明、系统日志和数据库备份说明。</p>
    </div>
    <a class="button secondary" href="{{ url_for('dashboard.dashboard') }}">返回首页</a>
</section>

<div class="module-grid">
    <a class="module-card" href="{{ url_for('system.users') }}">用户账号管理</a>
    <a class="module-card" href="{{ url_for('system.logs') }}">系统日志查看</a>
    <a class="module-card" href="{{ url_for('system.backup') }}">数据库备份说明</a>
</div>
{% endblock %}
